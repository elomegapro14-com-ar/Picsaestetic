<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Selfie Light App</title>
    
    <meta name="theme-color" id="themeMeta" content="#cbeeff">
    
    <style>
        /* Forzar al navegador a pintar los fondos ocultos del sistema */
        html { 
            background-color: #cbeeff; 
            transition: background-color 0.2s ease; 
            height: -webkit-fill-available; 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        body {
            width: 100vw; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: space-between; 
            background-color: #cbeeff; 
            transition: background-color 0.2s ease;
            /* Protege los márgenes sin romper la pureza del color de fondo */
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
        }

        /* Contenedor de la cámara con estilo redondeado de la app original */
        .camera-container { 
            width: 85%; 
            max-width: 320px; 
            aspect-ratio: 3 / 4; 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2); 
            background-color: #000;
            position: relative;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); /* Modo espejo por defecto (frontal) */
        }

        /* Botón flotante para cambiar de cámara (Frontal/Trasera) */
        .flip-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        /* Botón de captura central */
        .capture-btn-container {
            z-index: 10;
        }

        .capture-btn { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            background-color: white; 
            border: 5px solid rgba(255, 255, 255, 0.4); 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            transition: transform 0.1s; 
        }

        .capture-btn:active { 
            transform: scale(0.9); 
        }

        /* Panel inferior translúcido para potenciar el efecto de luz */
        .bottom-panel { 
            width: 100%; 
            max-width: 420px; 
            background-color: rgba(25, 27, 31, 0.88); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 24px; 
            padding: 16px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15); 
            z-index: 10; 
        }

        .panel-menu { 
            display: flex; 
            justify-content: space-around; 
            color: rgba(255, 255, 255, 0.5); 
            font-size: 13px; 
            font-weight: 600; 
        }

        .menu-item.active { 
            color: white; 
            border-bottom: 2px solid white; 
            padding-bottom: 2px; 
        }

        /* Carrusel e indicadores de selección de color */
        .color-carousel { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding: 4px 0; 
            scrollbar-width: none; 
        }

        .color-carousel::-webkit-scrollbar { 
            display: none; 
        }

        .color-option { 
            width: 46px; 
            height: 46px; 
            border-radius: 12px; 
            cursor: pointer; 
            flex-shrink: 0; 
            border: 2px solid transparent; 
            transition: transform 0.2s; 
        }

        .color-option.active { 
            border: 2px solid white; 
            transform: scale(1.08); 
        }

        /* Contenedor del selector infinito (Arcoíris) */
        .color-picker-wrapper { 
            position: relative; 
            width: 46px; 
            height: 46px; 
            border-radius: 12px; 
            background: linear-gradient(45deg, red, yellow, green, cyan, blue, magenta, red); 
            overflow: hidden; 
            flex-shrink: 0; 
            border: 2px solid transparent; 
        }
        
        .color-picker-wrapper.active { 
            border: 2px solid white; 
        }

        .color-picker-wrapper input[type="color"] { 
            position: absolute; 
            top: -10px; 
            left: -10px; 
            width: 70px; 
            height: 70px; 
            cursor: pointer; 
            opacity: 0; 
        }
        
        /* El lienzo oculto para capturar los pixeles de la foto */
        canvas { 
            display: none; 
        }
    </style>
</head>
<body>

    <div class="camera-container">
        <button class="flip-btn" onclick="toggleCamera()">🔄</button>
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="capture-btn-container">
        <button class="capture-btn" id="snap"></button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="bottom-panel">
        <div class="panel-menu">
            <span class="menu-item active">● Vibe</span>
            <span class="menu-item">♡ Luz</span>
            <span class="menu-item">✦ Filtro</span>
        </div>
        <div class="color-carousel">
            <div class="color-picker-wrapper" id="pickerWrapper">
                <input type="color" id="customColorPicker" value="#cbeeff">
            </div>
            <div class="color-option" style="background-color: #00bfff;" onclick="changeColor('#00bfff', this)"></div>
            <div class="color-option active" style="background-color: #cbeeff;" onclick="changeColor('#cbeeff', this)"></div>
            <div class="color-option" style="background-color: #e6bcf0;" onclick="changeColor('#e6bcf0', this)"></div>
            <div class="color-option" style="background-color: #df00ff;" onclick="changeColor('#df00ff', this)"></div>
            <div class="color-option" style="background-color: #3b00db;" onclick="changeColor('#3b00db', this)"></div>
            <div class="color-option" style="background-color: #ffb6c1;" onclick="changeColor('#ffb6c1', this)"></div>
            <div class="color-option" style="background-color: #ffffff;" onclick="changeColor('#ffffff', this)"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const customColorPicker = document.getElementById('customColorPicker');
        const pickerWrapper = document.getElementById('pickerWrapper');
        const themeMeta = document.getElementById('themeMeta');

        let currentStream = null;
        let currentFacingMode = "user"; // "user" significa cámara frontal

        // Iniciar flujo de cámara con parámetros optimizados
        async function initCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: currentFacingMode === "user" ? { ideal: "user" } : { ideal: "environment" },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
            } catch (err) {
                console.error("Fallo con configuración ideal, intentando modo simple...", err);
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = currentStream;
                } catch (fallbackErr) {
                    alert("No se pudo iniciar la cámara. Revisa los permisos de tu navegador en GitHub.");
                    console.error(fallbackErr);
                }
            }
        }

        // Cambiar entre cámara frontal y trasera
        function toggleCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            
            // Si es la frontal añadimos efecto espejo visual, si es la trasera lo quitamos
            if (currentFacingMode === "user") {
                video.style.transform = "scaleX(-1)";
            } else {
                video.style.transform = "scaleX(1)";
            }
            
            initCamera();
        }

        // Lógica para alternar el color de iluminación total
        function changeColor(color, element) {
            document.documentElement.style.backgroundColor = color;
            document.body.style.backgroundColor = color;
            themeMeta.setAttribute('content', color);
            
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('active'));
            pickerWrapper.classList.remove('active');
            
            if (element) element.classList.add('active'); else pickerWrapper.classList.add('active');
        }

        customColorPicker.addEventListener('input', (e) => { 
            changeColor(e.target.value, null); 
        });

        // Evento de disparo: genera flash y guarda la selfie en la galería
        document.getElementById('snap').addEventListener('click', () => {
            const currentBg = document.body.style.backgroundColor;
            
            // 1. Flash blanco instantáneo
            changeColor('#ffffff', null);

            // 2. Procesar fotograma en el lienzo oculto
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            // Conservar el efecto espejo en el archivo final solo si es la cámara frontal
            if (currentFacingMode === "user") {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 3. Crear descarga y guardado automático
            const dataUrl = canvas.toDataURL('image/jpeg');
            const link = document.createElement('a');
            link.download = `selfie_${Date.now()}.jpg`;
            link.href = dataUrl;
            link.click();

            // Restaurar el color seleccionado después de 120 milisegundos
            setTimeout(() => { 
                changeColor(currentBg, null); 
            }, 120);
        });

        // Lanzar la cámara al cargar por primera vez
        initCamera();
    </script>
</body>
</html>
